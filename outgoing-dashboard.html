<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Outgoing — WA Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2563eb; --primary-h: #1d4ed8;
      --success: #16a34a; --danger: #dc2626;
      --bg: #f1f5f9; --surface: #fff;
      --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    .nav { background: #0f172a; height: 56px; display: flex; align-items: center; padding: 0 24px; gap: 4px; position: sticky; top: 0; z-index: 100; }
    .nav-brand { color: #f1f5f9; font-weight: 700; font-size: 15px; margin-right: 20px; display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .nav-dot { width: 8px; height: 8px; background: #25d366; border-radius: 50%; }
    .nav a { color: #94a3b8; text-decoration: none; font-size: 13px; padding: 6px 10px; border-radius: 6px; transition: all .15s; }
    .nav a:hover, .nav a.active { color: #f1f5f9; background: rgba(255,255,255,.08); }

    .page { max-width: 1200px; margin: 32px auto; padding: 0 20px; }
    .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .page-title { font-size: 22px; font-weight: 700; }
    .page-sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .last-update { font-size: 11px; color: var(--muted); }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; box-shadow: var(--shadow); }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-pending  .stat-value { color: #92400e; }
    .stat-sent     .stat-value { color: var(--primary); }
    .stat-delivered .stat-value { color: var(--success); }
    .stat-read     .stat-value { color: #6d28d9; }
    .stat-failed   .stat-value { color: var(--danger); }

    /* Filters */
    .filters { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; box-shadow: var(--shadow); }
    .form-input-sm { padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; font-family: inherit; color: var(--text); outline: none; transition: border-color .15s; }
    .form-input-sm:focus { border-color: var(--primary); }
    .form-select-sm { padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; font-family: inherit; color: var(--text); background: var(--surface); outline: none; }
    .btn-sm { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border: none; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; font-family: inherit; }
    .btn-primary-sm { background: var(--primary); color: #fff; }
    .btn-primary-sm:hover { background: var(--primary-h); }
    .btn-outline-sm { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline-sm:hover { background: var(--bg); }
    .filter-sep { height: 28px; width: 1px; background: var(--border); }

    /* Table */
    .card { background: var(--surface); border-radius: 14px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8fafc; font-weight: 600; color: var(--muted); text-transform: uppercase; font-size: 11px; letter-spacing: .05em; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbff; }
    tr.row-read td { background: #f5f3ff; }
    tr.row-read:hover td { background: #ede9fe; }

    .id-cell { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
    .msg-cell { max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .time-cell { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .time-cell .update { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    /* Status badges */
    .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .badge-pending   { background: #fef3c7; color: #92400e; }
    .badge-sent      { background: #dbeafe; color: #1e40af; }
    .badge-delivered { background: #dcfce7; color: #15803d; }
    .badge-read      { background: #ede9fe; color: #6d28d9; }
    .badge-failed    { background: #fee2e2; color: #991b1b; }
    .badge-not_registered { background: #f3f4f6; color: #374151; }

    .type-badge { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; background: #f1f5f9; color: var(--muted); }
    .type-pdf  { background: #fee2e2; color: #991b1b; }
    .type-file { background: #fef3c7; color: #92400e; }

    /* Pagination */
    .table-footer { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--border); flex-wrap: wrap; gap: 10px; }
    .total-info { font-size: 12px; color: var(--muted); }
    .pagination { display: flex; gap: 4px; align-items: center; }
    .page-btn { padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); font-size: 12px; cursor: pointer; transition: all .15s; font-family: inherit; }
    .page-btn:hover:not(:disabled) { background: var(--bg); border-color: var(--primary); color: var(--primary); }
    .page-btn:disabled { opacity: .4; cursor: default; }
    .page-info { font-size: 12px; color: var(--muted); padding: 0 4px; }

    .realtime-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #22c55e; margin-right: 4px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/wa-dashboard.html" class="nav-brand"><span class="nav-dot"></span>WA Gateway</a>
  <a href="/qr-scanner.html">QR Scanner</a>
  <a href="/wa-dashboard.html">Dashboard</a>
  <a href="/send-text.html">Kirim Teks</a>
  <a href="/send-media.html">Kirim Media</a>
  <a href="/wa-clients.html">Clients</a>
  <a href="/outgoing-dashboard.html" class="active">Outgoing</a>
  <a href="/incoming-dashboard.html">Incoming</a>
  <a href="/templates.html">Templates</a>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Monitoring Outgoing</div>
      <div class="page-sub"><span class="realtime-dot"></span>Realtime status pesan keluar WhatsApp</div>
    </div>
    <div class="last-update" id="lastUpdate">—</div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card stat-pending">
      <div class="stat-label">Pending</div>
      <div class="stat-value" id="s-pending">0</div>
    </div>
    <div class="stat-card stat-sent">
      <div class="stat-label">Sent</div>
      <div class="stat-value" id="s-sent">0</div>
    </div>
    <div class="stat-card stat-delivered">
      <div class="stat-label">Delivered</div>
      <div class="stat-value" id="s-delivered">0</div>
    </div>
    <div class="stat-card stat-read">
      <div class="stat-label">Read</div>
      <div class="stat-value" id="s-read">0</div>
    </div>
    <div class="stat-card stat-failed">
      <div class="stat-label">Failed</div>
      <div class="stat-value" id="s-failed">0</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <input class="form-input-sm" id="fStaff" placeholder="Filter staff ID" style="width:160px;">
    <input class="form-input-sm" id="fNumber" placeholder="Filter nomor WA" style="width:170px;">
    <input class="form-input-sm" id="fText" placeholder="Cari isi pesan" style="width:200px;">
    <div class="filter-sep"></div>
    <select class="form-select-sm" id="fStatus">
      <option value="">Semua status</option>
      <option>pending</option><option>sent</option><option>delivered</option>
      <option>read</option><option>failed</option><option>not_registered</option>
    </select>
    <button class="btn-sm btn-primary-sm" onclick="onFilter()">Filter</button>
    <button class="btn-sm btn-outline-sm" onclick="clearFilter()">Reset</button>
    <div class="filter-sep"></div>
    <span style="font-size:12px;color:var(--muted);">Rows:</span>
    <select class="form-select-sm" id="pageSize" onchange="onPageSizeChange()" style="width:70px;">
      <option>10</option><option value="20" selected>20</option><option>50</option><option>100</option>
    </select>
    <button class="btn-sm btn-outline-sm" onclick="reloadData()">↻ Reload</button>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:50px;">ID</th>
            <th style="width:100px;">Staff</th>
            <th style="width:120px;">Nomor WA</th>
            <th>Pesan / File</th>
            <th style="width:60px;">Tipe</th>
            <th style="width:100px;">Status</th>
            <th style="width:160px;">Waktu (WIB)</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="table-footer">
      <div class="total-info" id="totalInfo">—</div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<script>
  const socket = io('/');
  let dataCache = [];
  let currentPage = 1;
  let rowsPerPage = 20;

  function fmtWIB(utc) {
    if (!utc) return '—';
    try {
      const d = new Date((utc.endsWith('Z') ? utc : utc + 'Z'));
      return d.toLocaleString('id-ID', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false, timeZone: 'Asia/Jakarta'
      }).replace(', ', ' ');
    } catch(e) { return utc.slice(0,19).replace('T',' '); }
  }

  function statusBadge(s) {
    return `<span class="badge badge-${s}">${s}</span>`;
  }

  function updateStats() {
    const cnt = { pending:0, sent:0, delivered:0, read:0, failed:0 };
    dataCache.forEach(r => { if (cnt[r.status] !== undefined) cnt[r.status]++; });
    Object.keys(cnt).forEach(k => {
      const el = document.getElementById('s-' + k);
      if (el) el.textContent = cnt[k];
    });
  }

  function getFilters() {
    return {
      staff:  document.getElementById('fStaff').value.trim().toLowerCase(),
      number: document.getElementById('fNumber').value.trim(),
      text:   document.getElementById('fText').value.trim().toLowerCase(),
      status: document.getElementById('fStatus').value
    };
  }

  function onFilter() { currentPage = 1; render(); }
  function onPageSizeChange() {
    rowsPerPage = parseInt(document.getElementById('pageSize').value) || 20;
    currentPage = 1; render();
  }
  function clearFilter() {
    ['fStaff','fNumber','fText'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fStatus').value = '';
    currentPage = 1; render();
  }

  function render() {
    const { staff, number, text, status } = getFilters();
    let filtered = dataCache.filter(r => {
      if (staff  && !(r.staff_id || '').toLowerCase().includes(staff)) return false;
      if (number && !(r.wa_number || '').includes(number)) return false;
      if (text   && !(r.message || '').toLowerCase().includes(text)) return false;
      if (status && r.status !== status) return false;
      return true;
    });

    const total = filtered.length;
    const pages = Math.ceil(total / rowsPerPage) || 1;
    if (currentPage > pages) currentPage = pages;

    const rows = filtered.slice((currentPage-1)*rowsPerPage, currentPage*rowsPerPage);
    const tbody = document.getElementById('tbody');

    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:32px;">Tidak ada data</td></tr>';
    } else {
      tbody.innerHTML = rows.map(r => `
        <tr class="${r.status === 'read' ? 'row-read' : ''}">
          <td class="id-cell">${r.id}</td>
          <td>${r.staff_id}</td>
          <td>${r.wa_number}</td>
          <td class="msg-cell" title="${(r.message||'').replace(/"/g,'&quot;')}">${r.message || '<i style="color:var(--muted)">—</i>'}</td>
          <td><span class="type-badge type-${r.msg_type}">${r.msg_type}</span></td>
          <td>${statusBadge(r.status)}</td>
          <td class="time-cell">
            <div>${fmtWIB(r.created_at)}</div>
            <div class="update">↻ ${fmtWIB(r.updated_at)}</div>
          </td>
        </tr>
      `).join('');
    }

    document.getElementById('totalInfo').textContent = `${total} baris | Hal. ${currentPage}/${pages}`;

    const pg = document.getElementById('pagination');
    const prev = document.createElement('button');
    prev.className = 'page-btn'; prev.textContent = '← Prev'; prev.disabled = currentPage <= 1;
    prev.onclick = () => { currentPage--; render(); };

    const info = document.createElement('span');
    info.className = 'page-info'; info.textContent = currentPage + ' / ' + pages;

    const next = document.createElement('button');
    next.className = 'page-btn'; next.textContent = 'Next →'; next.disabled = currentPage >= pages;
    next.onclick = () => { currentPage++; render(); };

    pg.innerHTML = ''; pg.append(prev, info, next);
    document.getElementById('lastUpdate').textContent = 'Update: ' + new Date().toLocaleTimeString('id-ID');
    updateStats();
  }

  async function reloadData() {
    try {
      const res = await fetch('/api/outgoing');
      const json = await res.json();
      if (!json.success) return;
      dataCache = json.data || [];
      currentPage = 1; render();
    } catch(e) {}
  }

  socket.on('wa-new-outgoing', row => {
    dataCache.unshift(row);
    if (dataCache.length > 500) dataCache.pop();
    render();
  });

  socket.on('wa-status-update', info => {
    const idx = dataCache.findIndex(r => r.message_id === info.messageId || (info.dbId && r.id === info.dbId));
    if (idx !== -1) {
      dataCache[idx].status = info.status;
      dataCache[idx].updated_at = new Date().toISOString().slice(0,19).replace('T',' ');
      render();
    } else {
      reloadData();
    }
  });

  reloadData();
</script>
</body>
</html>
