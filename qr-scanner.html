<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner — WA Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2563eb; --primary-h: #1d4ed8;
      --success: #16a34a; --danger: #dc2626;
      --bg: #f1f5f9; --surface: #fff;
      --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    /* NAV */
    .nav { background: #0f172a; height: 56px; display: flex; align-items: center; padding: 0 24px; gap: 4px; position: sticky; top: 0; z-index: 100; }
    .nav-brand { color: #f1f5f9; font-weight: 700; font-size: 15px; margin-right: 20px; display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .nav-dot { width: 8px; height: 8px; background: #25d366; border-radius: 50%; }
    .nav a { color: #94a3b8; text-decoration: none; font-size: 13px; padding: 6px 10px; border-radius: 6px; transition: all .15s; }
    .nav a:hover, .nav a.active { color: #f1f5f9; background: rgba(255,255,255,.08); }

    /* PAGE */
    .page { max-width: 480px; margin: 48px auto; padding: 0 20px; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .page-sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

    .card { background: var(--surface); border-radius: 14px; box-shadow: var(--shadow); border: 1px solid var(--border); padding: 28px; margin-bottom: 20px; }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .form-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; transition: border-color .15s, box-shadow .15s; }
    .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; font-family: inherit; width: 100%; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-h); }

    .qr-wrap { margin-top: 20px; display: none; text-align: center; }
    .qr-wrap img { width: 220px; height: 220px; border-radius: 12px; border: 4px solid var(--border); padding: 4px; background: #fff; }
    .qr-label { margin-top: 10px; font-size: 12px; color: var(--muted); }

    .status-bar { margin-top: 18px; padding: 12px 14px; border-radius: 8px; font-size: 13px; background: #1e293b; color: #f1f5f9; display: flex; align-items: center; gap: 8px; }
    .status-bar.success { background: var(--success); }
    .status-bar.error { background: var(--danger); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/wa-dashboard.html" class="nav-brand"><span class="nav-dot"></span>WA Gateway</a>
  <a href="/qr-scanner.html" class="active">QR Scanner</a>
  <a href="/wa-dashboard.html">Dashboard</a>
  <a href="/send-text.html">Kirim Teks</a>
  <a href="/send-media.html">Kirim Media</a>
  <a href="/wa-clients.html">Clients</a>
  <a href="/outgoing-dashboard.html">Outgoing</a>
  <a href="/incoming-dashboard.html">Incoming</a>
  <a href="/templates.html">Templates</a>
</nav>

<div class="page">
  <div class="page-title">QR Scanner</div>
  <div class="page-sub">Connect akun WhatsApp staff dengan scan QR</div>

  <div class="card">
    <div class="form-group">
      <label class="form-label">ID Staff</label>
      <input class="form-input" id="staffId" placeholder="contoh: staff_radiologi">
    </div>
    <button class="btn btn-primary" onclick="startScan()">Connect WhatsApp</button>

    <div class="qr-wrap" id="qrWrap">
      <img id="qrImage" src="" alt="QR Code">
      <div class="qr-label">Buka WhatsApp → Perangkat Tertaut → Tautkan Perangkat</div>
    </div>

    <div class="status-bar" id="statusBar">
      <span class="status-dot"></span>
      <span id="statusText">Masukkan ID Staff lalu klik Connect</span>
    </div>
  </div>
</div>

<script>
  const socket = io();

  function setStatus(text, type = '') {
    const bar = document.getElementById('statusBar');
    bar.className = 'status-bar' + (type ? ' ' + type : '');
    document.getElementById('statusText').textContent = text;
  }

  function startScan() {
    const id = document.getElementById('staffId').value.trim();
    if (!id) { setStatus('ID Staff wajib diisi', 'error'); return; }

    setStatus('Menghubungkan ke server...');
    document.getElementById('qrWrap').style.display = 'none';
    socket.emit('check-auth', { id });

    socket.on('qr:' + id, (qr) => {
      const img = document.getElementById('qrImage');
      img.src = qr;
      document.getElementById('qrWrap').style.display = 'block';
      setStatus('QR siap — silakan scan dengan WhatsApp');
    });

    socket.on('connected:' + id, () => {
      document.getElementById('qrWrap').style.display = 'none';
      setStatus('WhatsApp terhubung', 'success');
    });
  }
</script>
</body>
</html>
