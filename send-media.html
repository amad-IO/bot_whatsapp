<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirim Media — WA Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2563eb; --primary-h: #1d4ed8;
      --success: #16a34a; --danger: #dc2626;
      --bg: #f1f5f9; --surface: #fff;
      --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    .nav { background: #0f172a; height: 56px; display: flex; align-items: center; padding: 0 24px; gap: 4px; position: sticky; top: 0; z-index: 100; }
    .nav-brand { color: #f1f5f9; font-weight: 700; font-size: 15px; margin-right: 20px; display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .nav-dot { width: 8px; height: 8px; background: #25d366; border-radius: 50%; }
    .nav a { color: #94a3b8; text-decoration: none; font-size: 13px; padding: 6px 10px; border-radius: 6px; transition: all .15s; }
    .nav a:hover, .nav a.active { color: #f1f5f9; background: rgba(255,255,255,.08); }

    .page { max-width: 520px; margin: 48px auto; padding: 0 20px; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .page-sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

    .card { background: var(--surface); border-radius: 14px; box-shadow: var(--shadow); border: 1px solid var(--border); padding: 28px; }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .form-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .form-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; transition: border-color .15s, box-shadow .15s; }
    .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }

    .file-drop { border: 2px dashed var(--border); border-radius: 10px; padding: 24px; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; }
    .file-drop:hover, .file-drop.dragover { border-color: var(--primary); background: #eff6ff; }
    .file-drop input[type=file] { display: none; }
    .file-drop-icon { font-size: 28px; margin-bottom: 8px; }
    .file-drop-text { font-size: 13px; color: var(--muted); }
    .file-drop-text b { color: var(--primary); }
    .file-info { margin-top: 10px; padding: 8px 12px; background: #f8fafc; border-radius: 6px; font-size: 12px; color: var(--text); display: none; }

    .btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; font-family: inherit; width: 100%; margin-top: 4px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-h); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .status-bar { margin-top: 18px; padding: 12px 14px; border-radius: 8px; font-size: 13px; background: #1e293b; color: #f1f5f9; display: none; }
    .status-bar.success { background: var(--success); }
    .status-bar.error { background: var(--danger); }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/wa-dashboard.html" class="nav-brand"><span class="nav-dot"></span>WA Gateway</a>
  <a href="/qr-scanner.html">QR Scanner</a>
  <a href="/wa-dashboard.html">Dashboard</a>
  <a href="/send-text.html">Kirim Teks</a>
  <a href="/send-media.html" class="active">Kirim Media</a>
  <a href="/wa-clients.html">Clients</a>
  <a href="/outgoing-dashboard.html">Outgoing</a>
  <a href="/incoming-dashboard.html">Incoming</a>
  <a href="/templates.html">Templates</a>
</nav>

<div class="page">
  <div class="page-title">Kirim Media</div>
  <div class="page-sub">Kirim file PDF, foto, atau dokumen via WhatsApp</div>

  <div class="card">
    <div class="form-group">
      <label class="form-label">ID Staff</label>
      <input class="form-input" id="staffId" placeholder="contoh: staff_admin">
      <div class="form-hint">Harus sama dengan ID yang digunakan saat scan QR</div>
    </div>
    <div class="form-group">
      <label class="form-label">Nomor WhatsApp Tujuan</label>
      <input class="form-input" id="phone" placeholder="contoh: 62812xxxxxxxx">
    </div>
    <div class="form-group">
      <label class="form-label">File</label>
      <div class="file-drop" id="fileDrop" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" onchange="onFileChange(event)">
        <div class="file-drop-icon">📎</div>
        <div class="file-drop-text">Klik untuk pilih file<br><b>PDF, JPG, PNG, DOCX</b> didukung</div>
      </div>
      <div class="file-info" id="fileInfo"></div>
    </div>
    <button class="btn btn-primary" id="btnSend" onclick="sendMedia()">Kirim File</button>
    <div class="status-bar" id="statusBar"></div>
  </div>
</div>

<script>
  function onFileChange(e) {
    const file = e.target.files[0];
    if (!file) return;
    const info = document.getElementById('fileInfo');
    info.style.display = 'block';
    info.textContent = file.name + ' — ' + (file.size / 1024).toFixed(1) + ' KB';
  }

  function showStatus(text, type = '') {
    const bar = document.getElementById('statusBar');
    bar.style.display = 'block';
    bar.className = 'status-bar' + (type ? ' ' + type : '');
    bar.textContent = text;
  }

  async function sendMedia() {
    const staffId = document.getElementById('staffId').value.trim();
    const phone   = document.getElementById('phone').value.trim();
    const fileEl  = document.getElementById('fileInput');
    const btn     = document.getElementById('btnSend');

    if (!staffId || !phone) { showStatus('ID Staff dan nomor wajib diisi', 'error'); return; }
    if (!fileEl.files || !fileEl.files.length) { showStatus('File belum dipilih', 'error'); return; }

    const file = fileEl.files[0];
    const reader = new FileReader();

    reader.onload = async (e) => {
      let base64 = e.target.result;
      if (base64.startsWith('data:')) base64 = base64.split(',')[1];

      btn.disabled = true;
      showStatus('Mengirim file...');

      try {
        const res = await fetch('/api/send-media', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: staffId, phone, filename: file.name, fileData: base64 })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          showStatus('File berhasil dikirim — ID: ' + (data.messageId || '-'), 'success');
        } else {
          showStatus('Gagal: ' + (data.error || data.message || 'unknown'), 'error');
        }
      } catch (err) {
        showStatus('Error koneksi: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
      }
    };

    showStatus('Membaca file...');
    reader.readAsDataURL(file);
  }
</script>
</body>
</html>
