<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Aktif — WA Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2563eb; --primary-h: #1d4ed8;
      --success: #16a34a; --danger: #dc2626;
      --bg: #f1f5f9; --surface: #fff;
      --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    .nav { background: #0f172a; height: 56px; display: flex; align-items: center; padding: 0 24px; gap: 4px; position: sticky; top: 0; z-index: 100; }
    .nav-brand { color: #f1f5f9; font-weight: 700; font-size: 15px; margin-right: 20px; display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .nav-dot { width: 8px; height: 8px; background: #25d366; border-radius: 50%; }
    .nav a { color: #94a3b8; text-decoration: none; font-size: 13px; padding: 6px 10px; border-radius: 6px; transition: all .15s; }
    .nav a:hover, .nav a.active { color: #f1f5f9; background: rgba(255,255,255,.08); }

    .page { max-width: 720px; margin: 40px auto; padding: 0 20px; }
    .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .page-title { font-size: 22px; font-weight: 700; }
    .page-sub { color: var(--muted); font-size: 13px; margin-top: 2px; }

    .card { background: var(--surface); border-radius: 14px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-header-title { font-size: 14px; font-weight: 600; }
    .stat-badge { background: #f1f5f9; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; color: var(--muted); }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border: none; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; font-family: inherit; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-h); }
    .btn-danger-outline { background: transparent; border: 1px solid #fca5a5; color: var(--danger); }
    .btn-danger-outline:hover { background: #fee2e2; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8fafc; font-weight: 600; color: var(--muted); text-transform: uppercase; font-size: 11px; letter-spacing: .05em; padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbff; }

    .badge-online { display: inline-flex; align-items: center; gap: 5px; background: #dcfce7; color: #15803d; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; }
    .badge-online::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #16a34a; }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-icon { font-size: 36px; margin-bottom: 8px; }

    .toast { position: fixed; top: 72px; right: 20px; padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; color: #fff; z-index: 999; opacity: 0; transition: opacity .25s; }
    .toast.show { opacity: 1; }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/wa-dashboard.html" class="nav-brand"><span class="nav-dot"></span>WA Gateway</a>
  <a href="/qr-scanner.html">QR Scanner</a>
  <a href="/wa-dashboard.html">Dashboard</a>
  <a href="/send-text.html">Kirim Teks</a>
  <a href="/send-media.html">Kirim Media</a>
  <a href="/wa-clients.html" class="active">Clients</a>
  <a href="/outgoing-dashboard.html">Outgoing</a>
  <a href="/incoming-dashboard.html">Incoming</a>
  <a href="/templates.html">Templates</a>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Client Aktif</div>
      <div class="page-sub">Daftar akun WhatsApp yang sedang terhubung</div>
    </div>
    <button class="btn btn-primary" onclick="loadClients()">↻ Refresh</button>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-header-title">Connected Clients</span>
      <span class="stat-badge" id="totalBadge">0 client</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:48px;">#</th>
            <th>ID Client</th>
            <th style="width:120px;">Status</th>
            <th style="width:120px;">Aksi</th>
          </tr>
        </thead>
        <tbody id="clientBody">
          <tr><td colspan="4"><div class="empty-state"><div class="empty-icon">📡</div>Memuat data...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const socket = io('/');

  function showToast(text, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = text;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => t.className = 'toast', 2800);
  }

  async function loadClients() {
    try {
      const res = await fetch('/api/clients');
      const json = await res.json();
      if (!json.success) { showToast(json.message || 'Gagal memuat client', 'error'); return; }

      const clients = json.clients || [];
      const tbody = document.getElementById('clientBody');
      document.getElementById('totalBadge').textContent = clients.length + ' client';

      if (!clients.length) {
        tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">📵</div>Tidak ada client aktif</div></td></tr>';
        return;
      }

      tbody.innerHTML = clients.map((c, i) => `
        <tr>
          <td style="color:var(--muted);font-size:12px;">${i + 1}</td>
          <td><strong>${c.id}</strong></td>
          <td><span class="badge-online">Online</span></td>
          <td><button class="btn btn-danger-outline" onclick="disconnectClient('${c.id}')">Disconnect</button></td>
        </tr>
      `).join('');
    } catch (e) {
      showToast('Error koneksi: ' + e.message, 'error');
    }
  }

  async function disconnectClient(id) {
    if (!confirm('Yakin disconnect client "' + id + '"?')) return;
    try {
      const res = await fetch('/api/logout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      const json = await res.json();
      if (json.success) {
        showToast('Client ' + id + ' berhasil logout', 'success');
        loadClients();
      } else {
        showToast(json.message || 'Gagal logout', 'error');
      }
    } catch (e) {
      showToast('Error: ' + e.message, 'error');
    }
  }

  socket.on('wa-client-logout', () => loadClients());
  loadClients();
</script>
</body>
</html>
